spring:
  application:
    name: llmcalling

  config:
    import: "optional:file:.env[.properties]"

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}

        chat:
          options:
            model: gemini-2.5-flash
            max-output-tokens: 512
            temperature: 0.7
            top-p: 0.9